services:
  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: grobid
    ports:
      - "8070:8070"
    ulimits:
      core: 0
    restart: unless-stopped

  pipeline:
    build: .
    container_name: open-science-pipeline
    env_file:
      - .env
    environment:
      - GROBID_URL=http://grobid:8070
      - PYTHONUNBUFFERED=1
    depends_on:
      # start ordering only, no health condition
      - grobid
    volumes:
      - ./tmp:/app/tmp
    restart: "no"